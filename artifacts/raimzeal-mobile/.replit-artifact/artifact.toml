kind = "mobile"
previewPath = "/raimzeal-mobile/"
title = "RAIMZEAL Mobile"
version = "1.0.0"
id = "artifacts/raimzeal-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/raimzeal-mobile/" ]
localPort = 24798

[services.development]
run = "pnpm --filter @workspace/raimzeal-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raimzeal-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/raimzeal-mobile", "run", "serve" ]

[services.env]
PORT = "24798"
BASE_PATH = "/raimzeal-mobile/"
