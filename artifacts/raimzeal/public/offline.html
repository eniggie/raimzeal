<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAIMZEAL — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0b;
      color: #e8e8ec;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    img { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #2E8B57; }
    p { font-size: 16px; color: #9ca3af; line-height: 1.6; max-width: 280px; margin-bottom: 32px; }
    button {
      background: #2E8B57;
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img src="/favicon.png" alt="RAIMZEAL" />
  <h1>You're offline</h1>
  <p>Check your internet connection and try again. Your workout and nutrition data will sync when you're back online.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
