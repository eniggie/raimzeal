kind = "web"
previewPath = "/"
title = "RAIMZEAL"
version = "1.0.0"
id = "artifacts/raimzeal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18577

[services.development]
run = "pnpm --filter @workspace/raimzeal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raimzeal", "run", "build" ]
run = [ "node", "artifacts/raimzeal/server.mjs" ]

[services.env]
PORT = "18577"
BASE_PATH = "/"
