kind = "video"
previewPath = "/raimzeal-video/"
title = "RAIMZEAL Ad Video"
version = "1.0.0"
id = "artifacts/raimzeal-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/raimzeal-video/" ]
localPort = 20059

[services.development]
run = "pnpm --filter @workspace/raimzeal-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raimzeal-video", "run", "build" ]
publicDir = "artifacts/raimzeal-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20059"
BASE_PATH = "/raimzeal-video/"
