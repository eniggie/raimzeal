name: Build Android AAB for Google Play

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/raimzeal-mobile/**'
  workflow_dispatch:

jobs:
  build:
    name: Build signed Android App Bundle (.aab)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: artifacts/raimzeal-mobile
        run: pnpm install --frozen-lockfile

      - name: Submit EAS build and wait for .aab
        working-directory: artifacts/raimzeal-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          BUILD_JSON=$(eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --no-wait \
            --json 2>/dev/null)
          BUILD_ID=$(echo "$BUILD_JSON" | node -e \
            "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d)[0]?.id))")
          echo "EAS Build ID: $BUILD_ID"
          echo "Waiting for build to finish (up to 30 min)..."
          for i in $(seq 1 60); do
            sleep 30
            VIEW_JSON=$(eas build:view "$BUILD_ID" --json 2>/dev/null)
            STATUS=$(echo "$VIEW_JSON" | node -e \
              "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).status))")
            echo "[$i/60] Status: $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then
              AAB_URL=$(echo "$VIEW_JSON" | node -e \
                "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).artifacts?.buildUrl??''))")
              echo "Build finished. Downloading .aab..."
              curl -L "$AAB_URL" -o raimzeal-release.aab
              ls -lh raimzeal-release.aab
              break
            fi
            if [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed: $STATUS"
              exit 1
            fi
          done

      - name: Upload .aab as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: raimzeal-android-${{ github.run_number }}
          path: artifacts/raimzeal-mobile/raimzeal-release.aab
          retention-days: 30
          if-no-files-found: error
