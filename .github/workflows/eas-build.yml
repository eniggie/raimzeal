name: EAS Production Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: false
        default: all
        type: choice
        options: [all, android, ios]

jobs:
  build:
    name: Build ${{ matrix.platform }} (production)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'all' ||
      inputs.platform == matrix.platform
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        working-directory: artifacts/raimzeal-mobile
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build ${{ matrix.platform }} (production)
        working-directory: artifacts/raimzeal-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ${{ matrix.platform }} --profile production --non-interactive --no-wait
