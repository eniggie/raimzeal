name: EAS Production Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: false
        default: all
        type: choice
        options: [android, ios, all]

jobs:
  build-android:
    name: Build Android (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: artifacts/raimzeal-mobile
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android (production)
        working-directory: artifacts/raimzeal-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --non-interactive --no-wait

  build-ios:
    name: Build iOS (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: artifacts/raimzeal-mobile
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS (production)
        working-directory: artifacts/raimzeal-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile production --non-interactive --no-wait

  submit-android:
    name: Submit Android to Play Store (internal)
    runs-on: ubuntu-latest
    needs: build-android
    if: needs.build-android.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: artifacts/raimzeal-mobile
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Write Play Store service account key
        working-directory: artifacts/raimzeal-mobile
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
        run: echo "$GOOGLE_SERVICE_ACCOUNT_KEY_JSON" > google-play-service-account.json

      - name: Submit Android to Play Store
        working-directory: artifacts/raimzeal-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas submit --platform android --profile production --latest --non-interactive

      - name: Remove Play Store service account key
        if: always()
        working-directory: artifacts/raimzeal-mobile
        run: rm -f google-play-service-account.json

  submit-ios:
    name: Submit iOS to App Store (TestFlight)
    runs-on: ubuntu-latest
    needs: build-ios
    if: needs.build-ios.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: artifacts/raimzeal-mobile
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Write ASC API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p /tmp/asc
          echo "$ASC_API_KEY_P8" > /tmp/asc/key.p8

      - name: Submit iOS to App Store
        working-directory: artifacts/raimzeal-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          EXPO_ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          EXPO_ASC_API_KEY: /tmp/asc/key.p8
        run: |
          eas submit \
            --platform ios \
            --profile production \
            --latest \
            --non-interactive \
            --asc-app-id "$ASC_APP_ID"

      - name: Remove ASC API key
        if: always()
        run: rm -rf /tmp/asc
