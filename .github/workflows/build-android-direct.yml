name: Build Android AAB (Manual Trigger)

on:
  workflow_dispatch:

jobs:
  build:
    name: Submit build to EAS and get download link
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: artifacts/raimzeal-mobile
        run: pnpm install --frozen-lockfile

      - name: Build Android App Bundle
        working-directory: artifacts/raimzeal-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "================================================"
          echo "  RAIMZEAL — Android App Bundle Production Build"
          echo "  Package: com.econteur.raimzeal"
          echo "  Owner:   ECONTEUR LLC"
          echo "================================================"
          eas build \
            --platform android \
            --profile production \
            --non-interactive
          echo ""
          echo "✅ Done. Download your .aab from:"
          echo "   https://expo.dev/accounts/econteur/projects/raimzeal/builds"
